aid: defense-intelligence-agency
name: Defense Intelligence Agency
description: >-
  The Defense Intelligence Agency (DIA) is the U.S. Department of Defense
  combat support agency that produces, analyzes, and disseminates military
  intelligence on foreign militaries and operating environments to support
  warfighters, defense planners, and national-security policymakers. As an
  intelligence agency, DIA does not publish a general-purpose public API; its
  developer-facing surface is largely internal or restricted to the
  Intelligence Community. Public touchpoints include the GAMECHANGER policy
  analytics initiative, the DIA FOIA reading room, public news and article
  feeds, and procurement and recruiting portals.
