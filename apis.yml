apis:
  - aid: defense-intelligence-agency:defense-intelligence-agency-website
    name: Defense Intelligence Agency Website
    description: >-
      Public-facing presence of the Defense Intelligence Agency, providing
      organizational information, leadership, careers, news, and links to
      mission-specific programs. The website is the primary public surface for
      DIA but does not expose a general-purpose developer API.
    humanURL: https://www.dia.mil
    tags:
      - Federal Government
      - Intelligence
      - Website
    properties:
      - type: Documentation
        url: https://www.dia.mil
      - type: News
        url: https://www.dia.mil/News
  - aid: defense-intelligence-agency:defense-intelligence-agency-foia
    name: Defense Intelligence Agency FOIA Reading Room
    description: >-
      Online portal that publishes records released under the Freedom of
      Information Act, including frequently requested documents and
      declassified materials. Researchers can browse and download released
      records but there is no documented public API.
    humanURL: https://www.dia.mil/FOIA
    tags:
      - FOIA
      - Open Records
      - Transparency
    properties:
      - type: Documentation
        url: https://www.dia.mil/FOIA
  - aid: defense-intelligence-agency:defense-intelligence-agency-gamechanger
    name: Defense Intelligence Agency GAMECHANGER
    description: >-
      A policy analytics platform led by DIA in partnership with the Office
      of the Undersecretary of Defense for Intelligence and Security that
      ingests, normalizes, and searches tens of thousands of DoD policy
      documents. GAMECHANGER is referenced in DIA public articles but does
      not publish a public developer API.
    humanURL: https://www.dia.mil/News-Features/Articles/Article-View/Article/2926343/gamechanger
    tags:
      - Analytics
      - Policy
      - Search
    properties:
      - type: Documentation
        url: https://www.dia.mil/News-Features/Articles/Article-View/Article/2926343/gamechanger
